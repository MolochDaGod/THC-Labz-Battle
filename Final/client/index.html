<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="THC Dope Budz" />
    <title>THC Dope Budz - Real Ad Monetization</title>
    
    <!-- Load AdMob configuration for real revenue generation -->
    <script src="/admob-config.js"></script>
    
    <!-- Font preloading -->
    <link rel="preload" href="/attached_assets/LEMONMILK-Regular_1753699232902.otf" as="font" type="font/otf" crossorigin>
    <link rel="preload" href="/attached_assets/Thumbs Down_1753699310971.otf" as="font" type="font/otf" crossorigin>
    
    <style>
      /* Critical CSS for loading */
      body {
        margin: 0;
        padding: 0;
        background: #000;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden;
      }
      
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .loading-logo {
        width: 120px;
        height: 120px;
        margin-bottom: 30px;
        border-radius: 50%;
        background: linear-gradient(45deg, #4ade80, #22c55e);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        animation: pulse 2s infinite;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }
      
      .loading-text {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 20px;
        background: linear-gradient(45deg, #4ade80, #22c55e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      .loading-subtitle {
        font-size: 14px;
        color: #888;
        margin-bottom: 30px;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #333;
        border-top: 3px solid #4ade80;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .monetization-info {
        position: absolute;
        bottom: 30px;
        text-align: center;
        font-size: 12px;
        color: #666;
      }
      
      .monetization-info strong {
        color: #4ade80;
      }
    </style>
  </head>
  
  <body>
    <div class="loading-screen" id="loadingScreen">
      <div class="loading-logo">🌿</div>
      <div class="loading-text">THC Dope Budz</div>
      <div class="loading-subtitle">Real Ad Monetization System</div>
      <div class="loading-spinner"></div>
      
      <div class="monetization-info">
        <div><strong>Google AdMob Integration Active</strong></div>
        <div>Revenue: $0.01-$0.05 per ad view</div>
        <div>Monthly potential: $225-$2,250</div>
      </div>
    </div>
    
    <div id="root"></div>
    
    <script>
      // Remove loading screen when app loads
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const loadingScreen = document.getElementById('loadingScreen');
          if (loadingScreen) {
            loadingScreen.style.opacity = '0';
            loadingScreen.style.transition = 'opacity 0.5s ease-out';
            setTimeout(() => {
              loadingScreen.remove();
            }, 500);
          }
        }, 2000);
      });
      
      // Ad revenue tracking
      let adRevenueTracking = {
        totalViews: 0,
        estimatedRevenue: 0
      };
      
      // Listen for ad completion events
      window.addEventListener('adRewardEarned', (event) => {
        adRevenueTracking.totalViews++;
        adRevenueTracking.estimatedRevenue += 0.025; // Average $0.025 per view
        
        console.log('💰 Ad Revenue Tracking:', {
          totalAdsWatched: adRevenueTracking.totalViews,
          estimatedRevenueEarned: `$${adRevenueTracking.estimatedRevenue.toFixed(3)}`,
          monthlyProjection: `$${(adRevenueTracking.estimatedRevenue * 30).toFixed(2)}`
        });
      });
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
